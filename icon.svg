<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 和紙の背景 -->
  <rect width="512" height="512" rx="112" fill="#F7F4ED"/>
  <!-- 円相（enso）: 筆の揺れのある薄い円環。途切れと太細で禅味を出す -->
  <path fill="none" stroke="#1C1C1C" stroke-width="15" stroke-linecap="round" opacity="0.22"
    d="M331 150
       C 392 178 430 232 430 296
       C 430 380 356 436 262 436
       C 168 436 96 376 96 290
       C 96 206 160 150 250 146" />
  <!-- 円相の入り（筆の打ち込み、やや太く） -->
  <path fill="none" stroke="#1C1C1C" stroke-width="22" stroke-linecap="round" opacity="0.22"
    d="M250 146 C 280 144 308 146 331 150" />
  <!-- 中央: 墨の「音」 -->
  <text x="256" y="262" text-anchor="middle"
    font-family="'Hiragino Mincho ProN','Yu Mincho','Songti SC',serif"
    font-size="232" fill="#1C1C1C">音</text>
  <!-- 水面の波紋（極薄、レンズ＝観察のメタファ） -->
  <circle cx="256" cy="372" r="30" fill="none" stroke="#2D4A63" stroke-width="3" opacity="0.18"/>
  <circle cx="256" cy="372" r="52" fill="none" stroke="#2D4A63" stroke-width="2" opacity="0.10"/>
</svg>
